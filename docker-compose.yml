services:
  app:
    build:
      context: .
    environment:
      APP_ENV: development
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/room_booking?sslmode=disable
      DATABASE_MAX_CONNS: "4"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: room_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d room_booking"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
